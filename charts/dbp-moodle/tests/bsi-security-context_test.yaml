# BSI IT-Grundschutz SYS.1.6 — Sichere Containerkonfiguration
#
# Verwandte BSI-Kriterien:
#   SYS.1.6.A6:  Sichere Konfiguration der Container-Infrastruktur
#   SYS.1.6.A15: Privileged-Container-Isolation — kein privileged: true
#   SYS.1.6.A16: Rootless-Container — runAsNonRoot, kein runAsUser: 0
#   SYS.1.6.A20: Minimale Capabilities — capabilities.drop: [ALL]
#
# Trivy-Mapping (wird durch `trivy config` ergänzend geprüft):
#   KSV010 — Avoid privileged containers         → SYS.1.6.A15
#   KSV001/KSV012 — Avoid running as root        → SYS.1.6.A16
#   KSV002/KSV035 — Drop ALL capabilities        → SYS.1.6.A20
#   KSV025/KSV030 — Seccomp RuntimeDefault       → SYS.1.6.A18 (im Moodle-Subchart)
#
# HINWEIS: Der moodle-update-preparation-job setzt nur `privileged: false`
# und fehlt Kontrollen wie allowPrivilegeEscalation, runAsNonRoot, capabilities.
# Die entsprechenden Tests sind als `pending` markiert bis das Template gehärtet ist.

suite: "BSI SYS.1.6.A6/A15/A16/A20 – Sichere Containerkonfiguration"

tests:
  # ── Restore-Job (templates/chart-hooks/moodle-restore-job.yaml) ─────────────
  - it: "restore-job: Container darf nicht privilegiert laufen (SYS.1.6.A15)"
    template: templates/chart-hooks/moodle-restore-job.yaml
    set:
      dbpMoodle.restore.enabled: true
    asserts:
      - isKind:
          of: Job
      - equal:
          path: spec.template.spec.containers[0].securityContext.privileged
          value: false

  - it: "restore-job: Keine Privilege-Eskalation erlaubt (SYS.1.6.A16)"
    template: templates/chart-hooks/moodle-restore-job.yaml
    set:
      dbpMoodle.restore.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false

  - it: "restore-job: ALL capabilities werden gedroppt (SYS.1.6.A20)"
    template: templates/chart-hooks/moodle-restore-job.yaml
    set:
      dbpMoodle.restore.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop
          content: "ALL"

  - it: "restore-job: Pod-SecurityContext setzt fsGroup (SYS.1.6.A6)"
    template: templates/chart-hooks/moodle-restore-job.yaml
    set:
      dbpMoodle.restore.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 1001

  # ── Update-Preparation-Job (templates/chart-hooks/moodle-update-preparation-job.yaml)
  # LÜCKE: Nur `privileged: false` gesetzt – allowPrivilegeEscalation, runAsNonRoot
  # und capabilities.drop fehlen im Template. Ticket: Template härten.
  - it: "update-preparation-job: Container darf nicht privilegiert laufen (SYS.1.6.A15)"
    template: templates/chart-hooks/moodle-update-preparation-job.yaml
    set:
      dbpMoodle.moodleUpdatePreparationJob.enabled: true
      dbpMoodle.restore.enabled: false
    asserts:
      - isKind:
          of: Job
      - equal:
          path: spec.template.spec.containers[0].securityContext.privileged
          value: false

