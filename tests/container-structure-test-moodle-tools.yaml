schemaVersion: "2.0.0"

commandTests:
  - name: "kubectl is available"
    command: "kubectl"
    args: ["version", "--client"]
    expectedOutput: ["v1\\.33"]

  - name: "psql version 16 is installed"
    command: "psql"
    args: ["--version"]
    expectedOutput: ["psql.*16\\."]

  - name: "python3 is available"
    command: "python3"
    args: ["--version"]
    expectedOutput: ["Python 3"]

  - name: "boto3 is importable"
    command: "python3"
    args: ["-c", "import boto3; print('ok')"]
    expectedOutput: ["ok"]

  - name: "duply is available"
    command: "duply"
    args: ["usage"]
    exitCode: 0

  - name: "curl is available"
    command: "curl"
    args: ["--version"]
    expectedOutput: ["curl"]

fileExistenceTests:
  - name: "kubectl binary"
    path: "/usr/local/bin/kubectl"
    shouldExist: true

metadataTest:
  user: "1001"
