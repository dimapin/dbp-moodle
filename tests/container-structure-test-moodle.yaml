  - name: "pluginCheck.sh"
    path: "/scripts/init/pluginCheck.sh"
    shouldExist: true

  - name: "updateCheck.sh"
    path: "/scripts/init/updateCheck.sh"
    shouldExist: true

  - name: "moodleSetup.sh"
